<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#F5F0E8">
  <title>POLARITY — Final Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── Podium (top 3) ── */
    .podium {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .podium-card {
      flex: 1;
      min-width: 0;
      background: var(--white);
      border: 2px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      padding: 14px 8px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .podium-1 { order: 2; padding-top: 14px; border-width: 2.5px; box-shadow: 6px 6px 0 var(--ink); }
    .podium-2 { order: 1; }
    .podium-3 { order: 3; }

    .podium-roof {
      display: block;
      margin-bottom: 2px;
    }

    .podium-rank-badge {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--border);
    }

    .podium-winner-badge {
      background: var(--ink);
      color: var(--paper);
      padding: 4px 10px;
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .podium-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      overflow: hidden;
      flex-shrink: 0;
    }

    .podium-1 .podium-avatar { width: 64px; height: 64px; border-width: 2.5px; }

    .podium-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
    }

    .podium-name {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    /* ── Stone dot indicator ── */
    .stone-dots {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .stone-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      background: transparent;
    }

    .stone-dot.filled { background: var(--ink); }

    .dot-overflow {
      font-size: 8px;
      font-weight: bold;
      letter-spacing: 0.04em;
      margin-left: 2px;
      color: var(--border);
    }

    /* ── Leaderboard ── */
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 16px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      border: 1.5px solid var(--border);
      padding: 10px 12px;
    }

    .lb-rank {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.06em;
      color: var(--border);
      width: 20px;
      flex-shrink: 0;
    }

    .lb-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      overflow: hidden;
      flex-shrink: 0;
    }

    .lb-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
    }

    .lb-name {
      flex: 1;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-snaps {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      text-transform: uppercase;
      color: var(--border);
    }

    .lb-stones {
      font-size: 10px;
      color: var(--border);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── Stats ── */
    .stats-section {
      border: 1.5px solid var(--border);
      padding: 14px 14px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .stats-row:last-child { border-bottom: none; }

    .stats-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--border);
    }

    .stats-value {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.06em;
    }

    /* ── Header ── */
    .win-header {
      text-align: center;
      padding-bottom: 14px;
      margin-bottom: 18px;
      border-bottom: 2px solid var(--ink);
    }

    .win-header .tag {
      font-size: 9px;
      font-weight: bold;
      color: var(--muted);
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .win-header .title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 3px;
      line-height: 1.15;
    }

    /* ── Loading state ── */
    .win-loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--border);
    }
  </style>
</head>
<body>
  <div class="screen">

    <!-- Header -->
    <div class="win-header">
      <div class="tag">[POLARITY]</div>
      <div class="title">FINAL RESULTS</div>
      <p id="round-label" style="font-size:9px;font-weight:bold;letter-spacing:2px;color:var(--border);margin-top:5px;text-transform:uppercase"></p>
    </div>

    <div id="win-content" class="win-loading">LOADING...</div>

    <div style="flex:1"></div>

    <!-- Actions -->
    <div class="lobby-actions" style="margin-top:20px">
      <button class="btn btn-primary" id="play-again-btn" style="display:none">[ PLAY AGAIN ]</button>
      <button class="btn btn-outline" id="back-lobby-btn">[ BACK TO LOBBY ]</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="../js/win.js"></script>
</body>
</html>
