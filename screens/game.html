<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1A1A">
  <title>POLARITY — Game</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/matter-js@0.19.0/build/matter.min.js"></script>
  <style>
    body { background: #1A1A1A; overflow: hidden; }

    #game-wrap {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Top HUD ── */
    #hud-top {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: var(--paper);
      border-bottom: 1.5px solid var(--ink);
      flex-shrink: 0;
      gap: 10px;
    }

    .hud-brand {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .hud-brand .stone-icon { width: 16px; height: 16px; font-size: 9px; }

    .hud-brand-name {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
    }

    .hud-sep {
      color: var(--border);
      font-size: 11px;
      flex-shrink: 0;
    }

    #hud-round {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--border);
      flex-shrink: 0;
    }

    /* Player strip — top HUD right side */
    #player-strip {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      overflow: hidden;
    }

    .strip-player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .strip-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      overflow: hidden;
      background: var(--border);
    }

    .strip-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
    }

    .strip-avatar.is-me { border-width: 2.5px; }

    .strip-counts {
      font-size: 8px;
      font-weight: bold;
      letter-spacing: 0.02em;
      white-space: nowrap;
      line-height: 1;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #1A1A1A;
      min-height: 0;
    }

    #board-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ── Round overlay ── */
    #round-overlay {
      position: absolute;
      inset: 0;
      background: rgba(245, 240, 232, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #round-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-title {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #round-results {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--border);
      text-align: center;
      line-height: 2;
    }

    #overlay-sub {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--border);
    }

    /* ── Bottom HUD ── */
    #hud-bottom {
      flex-shrink: 0;
      background: var(--paper);
      border-top: 1.5px solid var(--ink);
      display: flex;
      align-items: center;
      padding: 10px 14px 14px;
      gap: 10px;
    }

    /* Stone selector — left */
    #stone-selector {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .stone-btn {
      width: 56px;
      height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1.5px solid var(--ink);
      border-radius: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.1s;
    }

    .stone-btn.plus  { background: var(--ink); color: var(--paper); }
    .stone-btn.minus { background: transparent; color: var(--ink); }

    .stone-btn.active {
      box-shadow: 0 0 0 2.5px var(--paper), 0 0 0 4.5px var(--ink);
    }

    .stone-btn:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }

    .stone-btn-sym { font-size: 20px; line-height: 1; }
    .stone-btn-n   { font-size: 10px; opacity: 0.75; }

    /* Game meta — right of stone selector */
    #game-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    #hud-timer {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 0.04em;
      line-height: 1;
      transition: color 0.2s;
    }

    #hud-timer.urgent { color: #E63946; }

    #snap-count {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--border);
    }
  </style>
</head>
<body>

  <div id="game-wrap">

    <!-- Top HUD: brand + round + player strip -->
    <div id="hud-top">
      <div class="hud-brand">
        <span class="stone-icon plus">+</span>
        <span class="stone-icon minus">−</span>
        <span class="hud-brand-name">POLARITY</span>
      </div>
      <span class="hud-sep">·</span>
      <span id="hud-round">ROUND 1</span>
      <div id="player-strip"></div>
    </div>

    <!-- Board canvas -->
    <div id="canvas-wrap">
      <canvas id="board-canvas"></canvas>

      <!-- Round end overlay -->
      <div id="round-overlay">
        <div class="overlay-title">[ ROUND COMPLETE ]</div>
        <div id="round-results"></div>
        <button id="overlay-btn" class="btn btn-primary btn-sm"
          style="width:auto;padding:11px 28px;display:none">
          [ NEXT ROUND ]
        </button>
        <div id="overlay-sub">WAITING FOR HOST...</div>
      </div>
    </div>

    <!-- Bottom HUD: stone selector + timer/snap -->
    <div id="hud-bottom">
      <div id="stone-selector">
        <button class="stone-btn plus active" id="btn-plus">
          <span class="stone-btn-sym">+</span>
          <span class="stone-btn-n" id="count-plus">50</span>
        </button>
        <button class="stone-btn minus" id="btn-minus">
          <span class="stone-btn-sym">−</span>
          <span class="stone-btn-n" id="count-minus">5</span>
        </button>
      </div>
      <div id="game-meta">
        <div id="hud-timer">—</div>
        <div id="snap-count">SNAP 0</div>
      </div>
    </div>

  </div>

  <script type="module" src="../js/game.js"></script>
</body>
</html>
