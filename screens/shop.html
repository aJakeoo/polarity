<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#F5F0E8">
  <title>POLARITY — Power-Up Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .balance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--white);
      border: 2.5px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .balance-amount {
      font-size: 34px;
      font-weight: bold;
      letter-spacing: -1px;
      line-height: 1;
    }

    .flux-label {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .flux-tag {
      border: 2px solid var(--muted);
      padding: 6px 14px;
      text-align: center;
    }

    .flux-tag span {
      font-size: 10px;
      font-weight: bold;
      color: var(--muted);
      letter-spacing: 3px;
    }

    .shop-hint {
      border: 1.5px solid var(--border);
      background: var(--waiting-bg);
      padding: 7px 12px;
      text-align: center;
      margin-bottom: 16px;
    }

    .shop-hint span {
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .powerup-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .powerup-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 2.5px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      padding: 12px;
    }

    .powerup-card.owned { opacity: 0.6; }

    .powerup-icon {
      width: 44px;
      height: 44px;
      border: 2px solid var(--ink);
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .powerup-info { flex: 1; min-width: 0; }

    .powerup-name {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .powerup-desc {
      font-size: 8px;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 3px;
    }

    .powerup-buy {
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0;
      background: var(--paper);
      color: var(--ink);
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      padding: 5px 9px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .powerup-buy:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

    .powerup-owned-badge {
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .shop-header {
      text-align: center;
      padding-bottom: 16px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--ink);
    }

    .shop-header .tag {
      font-size: 9px;
      font-weight: bold;
      color: var(--muted);
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .shop-header .title {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div class="screen">

    <div class="shop-header">
      <div class="tag">[POLARITY]</div>
      <div class="title">POWER-UP SHOP</div>
    </div>

    <div class="balance-row">
      <div>
        <div class="flux-label">[ BALANCE ]</div>
        <div class="balance-amount" id="flux-balance">—</div>
      </div>
      <div class="flux-tag"><span>FLUX</span></div>
    </div>

    <div class="shop-hint"><span>[ MAX 3 ACTIVE POWER-UPS — NEW PURCHASE REPLACES OLDEST ]</span></div>

    <div class="powerup-list" id="powerup-list">
      <p class="loading-text">LOADING...</p>
    </div>

    <div style="flex:1"></div>

    <button class="btn btn-primary" id="back-btn" style="margin-top:20px">[ BACK TO GAME ]</button>

  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="../js/shop.js"></script>
</body>
</html>
